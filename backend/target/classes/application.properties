# =============================================
# Silent Hall — UMAT AI Quiz System
# Application Properties
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/umat_quiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kwekufrimpong7
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=UMATQuizSystemSecretKey2026VeryLongAndSecureKeyForJWT
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Recordings Storage
recordings.local.path=./recordings
recordings.naming.pattern={reference}_{course}_{timestamp}.mp4

# AWS S3 (optional — set these to enable cloud storage)
# aws.s3.enabled=false
# aws.s3.bucket-name=umat-quiz-recordings
# aws.s3.region=us-east-1
# aws.access-key=YOUR_AWS_ACCESS_KEY
# aws.secret-key=YOUR_AWS_SECRET_KEY

# Firebase (optional)
# firebase.enabled=false
# firebase.storage-bucket=umat-quiz.appspot.com
# firebase.credentials-path=./firebase-credentials.json


# ── Silent Hall — AI Service (Anthropic) ──────────────────────
# Set your Anthropic API key here to enable on-demand AI explanations.
# Leave blank to use the built-in fallback explanations.
anthropic.api.key=${ANTHROPIC_API_KEY:}
# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:8080

# Logging
logging.level.com.umat=DEBUG
logging.level.org.springframework.security=INFO
