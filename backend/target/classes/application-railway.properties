# =============================================
# Silent Hall — UMAT AI Quiz System
# Railway Production Configuration
# =============================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# CORS Configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Database — Uses Railway PostgreSQL or MySQL environment variables
spring.datasource.url=jdbc:${DATABASE_URL:mysql://localhost:3306/umat_quiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:Kwekufrimpong7}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JWT
jwt.secret=${JWT_SECRET:UMATQuizSystemSecretKey2026VeryLongAndSecureKeyForJWT}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Recordings Storage — Use Railway ephemeral file storage or cloud storage
recordings.local.path=/tmp/recordings
recordings.naming.pattern={reference}_{course}_{timestamp}.mp4

# Logging
logging.level.root=INFO
logging.level.com.umat.quiz=INFO

